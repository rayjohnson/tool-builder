name: Pull Request

on:
  pull_request: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Test and check coverage
        run: make coverage

  version:
    name: Version check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION was bumped
        run: |
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null | tr -d '[:space:]' || echo "0.0.0")
          PR_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
            echo "VERSION file was not updated (still ${PR_VERSION})."
            echo "Bump the version in VERSION before merging."
            exit 1
          fi
          echo "Version bumped: ${MAIN_VERSION} -> ${PR_VERSION}"
