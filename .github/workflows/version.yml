name: Version

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # On every PR: fail if VERSION was not bumped relative to main.
  check:
    name: Version check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION was bumped
        run: |
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null | tr -d '[:space:]' || echo "0.0.0")
          PR_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$MAIN_VERSION" = "$PR_VERSION" ]; then
            echo "VERSION file was not updated (still ${PR_VERSION})."
            echo "Bump the version in VERSION before merging."
            exit 1
          fi
          echo "Version bumped: ${MAIN_VERSION} -> ${PR_VERSION}"

  # On merge to main: create and push the version tag, which triggers release.yml.
  tag:
    name: Tag release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Tag and push
        run: |
          if [ ! -f VERSION ]; then
            echo "No VERSION file found — skipping tag."
            exit 0
          fi
          VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="v${VERSION}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping."
            exit 0
          fi
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged and pushed ${TAG}"
