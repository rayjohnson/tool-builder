# golangci-lint configuration
# See: https://golangci-lint.run/usage/configuration/

version: 2

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - asciicheck
    - bidichk
    - bodyclose
    - durationcheck
    - exhaustive
    - forcetypeassert
    - gosec
    - misspell
    - nolintlint
    - testifylint
    - wastedassign
    - dupword
    - gocheckcompilerdirectives
    - mirror
    - modernize
    - sloglint

  disable:
    - depguard
    - errcheck
    - forbidigo

linters-settings:
  gosec:
    excludes:
      - G104  # Audit errors not checked (too noisy)
      - G304  # File path provided as taint input
      - G404  # Insecure random number source

  exhaustive:
    default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - forcetypeassert
    - path: (cmd/|main\.go)
      linters:
        - gosec

  max-issues-per-linter: 0
  max-same-issues: 0
